                - heading "About the Oregon Ghost Conference" [level=2] [ref=e366]
                - paragraph [ref=e367]: If you've never been to the OGC, it's a 3 day long round-the-clock event which takes place at the Seaside Convention Center. There is always an amazing array of guest speakers who give presentations on everything from paranormal experiences, to spirit communication, haunted history, and pretty much anything you could imagine in the realm of the paranormal and metaphysical. The entire convention center is PACKED with paranormal teams, psychics, readers, artists, pop-up shops selling creepy-jewelry, dowsing rods, crystals, oils, and anything one might need in their witchcraft pantry. Each day is also filled with break-out classes taking place in the spacious classrooms outlining the entire convention center. Here, you can take any class from How to Read Tarot Cards to Practicums on the best tools and tech gadgets to use for ghost hunting. There are usually a couple of bigger events in the evenings also for which you can purchase tickets; gallery readings with psychic mediums and real actual ghost hunts at the most haunted locations in town!
                - heading "This Year's Virtual Format" [level=2] [ref=e368]
                - paragraph [ref=e369]: Granted, this year will be different. We won't be able to ghost hunt in person together, or casually stroll through the rows of eclectic vendors, but we can still have a Ghost Conference….of sorts! Rocky and his team are putting together an entire week of virtual events with many of participants of the OGC from years past, including yours truly. You can find an official line up of virtual events, including guest speakers, private readings, and even virtual classes at the link below.
