                - heading "What's Included" [level=2] [ref=e343]
                - paragraph [ref=e344]: There will be lots of hands on practice through the magic of breakout rooms, class material you get to keep and refer to whenever you'd like, and each class will be recorded and posted so you can watch them later in case you aren't able to make a class.
                - heading "Future Classes" [level=2] [ref=e345]
                - paragraph [ref=e346]: "The best part is: this will be one of a series of three Tarot classes I'll be doing through Kumara this year! So the intermediate and advanced courses will be coming later in the year! If you start your Tarot journey with me now, you'll be able to proceed with the rest of the courses later in the year!"
