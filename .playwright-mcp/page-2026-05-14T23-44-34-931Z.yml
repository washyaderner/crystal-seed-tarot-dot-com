                  - text: 133 SE Madison St, Portland, OR
              - generic [ref=e306]:
                - paragraph [ref=e307]: "Love is the essence that nourishes us—in the air we breathe, the connections we share, and the gifts we give. Be Love Fed is your invitation to gather in a space where love flows freely, where you're reminded of your wholeness, and where community becomes medicine. Join me, Holly Cole of Crystal Seed Tarot, alongside WReN: Wellness ReSource Network and a vibrant roster of local practitioners for a day of soulful exploration and healing."
                - heading "About the Event" [level=2] [ref=e308]
                - paragraph [ref=e309]: "Presented by WReN: Wellness ReSource Network, this one‑day fair combines immersive sound healing, handcrafted herbal elixirs, and a heart‑centered marketplace. Wander through our Sound Healing Chamber, sip botanical tonics at the Elixir & Tea Bar, and discover organic skincare, crystal therapies, and more from soul-aligned vendors. Whether you're a seasoned seeker or new to holistic wellness, there's something here to nourish your body, mind, and spirit."
                - heading "Tarot Readings with Holly Cole" [level=2] [ref=e310]
                - paragraph [ref=e311]:
                  - text: I'll be offering intuitive tarot sessions throughout the day. Receive personalized guidance, clarity, and inspiration as we explore your next steps together. To reserve your reading, email me at
                  - link "crystalseedtarot@gmail.com" [ref=e312] [cursor=pointer]:
                    - /url: mailto:crystalseedtarot@gmail.com
                  - text: —or simply stop by the Crystal Seed Tarot booth between sessions.
                - heading "Experience Highlights" [level=2] [ref=e313]
                - list [ref=e314]:
                  - listitem [ref=e315]:
                    - strong [ref=e316]: Opening Circle & Community Blessing
                    - text: at 11 am
                  - listitem [ref=e317]:
                    - strong [ref=e318]: Sound Healing Chamber
                    - text: open all day—drop in anytime
                  - listitem [ref=e319]:
                    - strong [ref=e320]: Elixir & Tea Bar
                    - text: by Fehu Farm Apothecary & Natalie Olson
                  - listitem [ref=e321]:
                    - strong [ref=e322]: Local Wellness Vendors
                    - text: featuring herbal crafts, oracle cards, bodywork, and more
                  - listitem [ref=e323]:
                    - strong [ref=e324]: Closing Circle & Angel Wash
                    - text: at 5:30 pm
                - paragraph [ref=e325]: Come to explore, to shop, to heal—or simply to be. You belong here. Let yourself be fed.
