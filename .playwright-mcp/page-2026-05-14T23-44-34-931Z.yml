          - article [ref=e265]:
            - img "McMenamins 25th Annual UFO Festival" [ref=e268]
            - generic [ref=e269]:
              - heading "McMenamins 25th Annual UFO Festival" [level=1] [ref=e270]
              - generic [ref=e271]:
                - generic [ref=e272]:
                  - strong [ref=e273]: "Date:"
                  - text: May 15, 2025
                - generic [ref=e274]:
                  - strong [ref=e275]: "Location:"
                  - text: McMenamins Hotel Oregon, 310 NE Evans St, McMinnville, OR
              - generic [ref=e276]:
                - paragraph [ref=e277]: I'm thrilled to announce that I'll be offering tarot readings at the 25th Annual McMenamins UFO Festival in McMinnville, Oregon! Join me for this cosmic celebration where the veil between worlds feels just a little thinner.
                - heading "About the Festival" [level=2] [ref=e278]
                - paragraph [ref=e279]: The UFO Festival began 25 years ago to commemorate the famous 1950 Trent sighting, when a local McMinnville couple spotted a flying disc over their farm and made national news. Now in its quarter-century milestone year, this event has become one of the most beloved gatherings for both skeptics and believers alike.
                - paragraph [ref=e280]: This year's festival features renowned UAP experts, an alien parade, street fair, live music, costume contests, and much more. The entire downtown transforms into a celebration of cosmic curiosity and extraterrestrial wonder!
                - heading "Tarot Readings with Crystal Seed Tarot" [level=2] [ref=e281]
                - paragraph [ref=e282]: "I'll be offering intuitive tarot readings throughout both days of the festival:"
                - list [ref=e283]:
                  - listitem [ref=e284]:
                    - strong [ref=e285]: Friday, May 16th
                    - text: ": 3:00 PM - 8:00 PM"
                  - listitem [ref=e286]:
                    - strong [ref=e287]: Saturday, May 17th
                    - text: ": 10:00 AM - 6:00 PM"
                - paragraph [ref=e288]: My readings at this special event blend cosmic awareness with practical guidance, perfect for those seeking answers about their path forward or connections to something beyond our ordinary understanding. Whether you're a festival regular or a curious first-timer, a tarot reading can provide unexpected insights during this unique weekend of cosmic exploration.
                - heading "Booking Information" [level=2] [ref=e289]
                - paragraph [ref=e290]:
                  - text: Readings will be available on a first-come, first-served basis during the festival. If you'd like to reserve a specific time slot in advance, please contact me at
                  - link "crystalseedtarot@gmail.com" [ref=e291] [cursor=pointer]:
                    - /url: mailto:crystalseedtarot@gmail.com
                  - text: with "UFO Festival Reading" in the subject line.
                - paragraph [ref=e292]: Look for my booth among the vendors along 3rd Street in downtown McMinnville. I can't wait to explore the cosmic currents with you at this extraordinary gathering!
              - link "Book a festival reading" [ref=e294] [cursor=pointer]:
                - /url: /contact
